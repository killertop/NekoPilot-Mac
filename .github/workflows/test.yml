name: "Test Native macOS"

on:
  push:
  pull_request:

concurrency:
  group: native-test-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  native-package:
    name: Native Apple Silicon hard gate
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select the pinned Xcode toolchain
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]] || { echo "::error::Test runner is not Apple Silicon"; exit 1; }
          test -d /Applications/Xcode_26.2.app
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version | grep -Fx "Xcode 26.2"
          [[ "$(xcrun --sdk macosx --show-sdk-version)" == "26.2" ]]

      - name: Set up pinned Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: false

      - name: Build reproducible sing-box sidecar
        env:
          GH_TOKEN: ${{ github.token }}
          GOPROXY: https://proxy.golang.org,direct
          NEKOPILOT_VERIFY_REPRODUCIBLE: "1"
        run: native/scripts/build-sing-box-macos-arm64.sh

      - name: Build and verify the complete native package
        env:
          NEKOPILOT_SING_BOX_SOURCE: ${{ github.workspace }}/native/.build/sidecar/sing-box
        run: native/scripts/package-macos.sh "$RUNNER_TEMP/native-test"

  release-policy:
    name: Publication policy
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Enforce native-only release policy
        run: native/scripts/check-release-policy.sh
