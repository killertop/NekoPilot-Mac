name: "Release"

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options:
          - dev
          - beta
          - stable
          - manual
        default: dev

  push:
    paths:
      - 'src-tauri/tauri.conf.json'
    branches:
      - feature/dev
      - feature/beta
      - main

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  # ── 1. Resolve channel-specific parameters ──────────────────────────
  resolve:
    runs-on: ubuntu-latest
    outputs:
      channel: ${{ steps.params.outputs.channel }}
      version: ${{ steps.params.outputs.version }}
      tag_name: ${{ steps.params.outputs.tag_name }}
      release_name: ${{ steps.params.outputs.release_name }}
      prerelease: ${{ steps.params.outputs.prerelease }}
      conf_template_branch: ${{ steps.params.outputs.conf_template_branch }}
      delete_tag: ${{ steps.params.outputs.delete_tag }}
      copy_from_tag: ${{ steps.params.outputs.copy_from_tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve channel parameters
        id: params
        shell: bash
        run: |
          # Determine channel from trigger
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            CHANNEL="${{ inputs.channel }}"
          else
            case "${{ github.ref_name }}" in
              feature/dev)  CHANNEL="dev" ;;
              feature/beta) CHANNEL="beta" ;;
              main)         CHANNEL="stable" ;;
              *) echo "::error::Unknown branch ${{ github.ref_name }}"; exit 1 ;;
            esac
          fi

          VERSION=$(node -p "require('./src-tauri/tauri.conf.json').version")

          case "$CHANNEL" in
            dev)
              TAG_NAME="dev"
              RELEASE_NAME="Dev"
              PRERELEASE="true"
              CONF_BRANCH="dev"
              DELETE_TAG="dev"
              COPY_FROM=""
              ;;
            beta)
              TAG_NAME="beta"
              RELEASE_NAME="Beta"
              PRERELEASE="true"
              CONF_BRANCH="beta"
              DELETE_TAG="beta"
              COPY_FROM="dev"
              ;;
            stable)
              TAG_NAME="v${VERSION}"
              RELEASE_NAME="v${VERSION}"
              PRERELEASE="false"
              CONF_BRANCH="stable"
              DELETE_TAG=""
              COPY_FROM="beta"
              ;;
            manual)
              TAG_NAME="manual"
              RELEASE_NAME="Manual"
              PRERELEASE="true"
              CONF_BRANCH="stable"
              DELETE_TAG="manual"
              COPY_FROM=""
              ;;
          esac

          echo "channel=$CHANNEL" >> $GITHUB_OUTPUT
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "tag_name=$TAG_NAME" >> $GITHUB_OUTPUT
          echo "release_name=$RELEASE_NAME" >> $GITHUB_OUTPUT
          echo "prerelease=$PRERELEASE" >> $GITHUB_OUTPUT
          echo "conf_template_branch=$CONF_BRANCH" >> $GITHUB_OUTPUT
          echo "delete_tag=$DELETE_TAG" >> $GITHUB_OUTPUT
          echo "copy_from_tag=$COPY_FROM" >> $GITHUB_OUTPUT

          echo "Channel: $CHANNEL"
          echo "Version: $VERSION"
          echo "Tag: $TAG_NAME | Release: $RELEASE_NAME | Prerelease: $PRERELEASE"
          echo "Template branch: $CONF_BRANCH"
          echo "Delete old tag: ${DELETE_TAG:-'(none)'}"
          echo "Copy from: ${COPY_FROM:-'(none, always build)'}"

  # ── 2. Delete old rolling release (dev/beta/manual) ────────────────
  delete-old-release:
    needs: resolve
    if: needs.resolve.outputs.delete_tag != ''
    runs-on: ubuntu-latest
    steps:
      - name: Delete old ${{ needs.resolve.outputs.delete_tag }} release
        uses: dev-drprasad/delete-tag-and-release@v1.1
        with:
          tag_name: ${{ needs.resolve.outputs.delete_tag }}
          delete_release: true
          repo: ${{ github.repository }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

  # ── 3. Check if we can reuse upstream artifacts (beta/stable only) ──
  check-reuse:
    needs: resolve
    if: needs.resolve.outputs.copy_from_tag != ''
    runs-on: ubuntu-latest
    outputs:
      can_reuse: ${{ steps.check.outputs.can_reuse }}
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Check version against ${{ needs.resolve.outputs.copy_from_tag }}
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPY_FROM_TAG: ${{ needs.resolve.outputs.copy_from_tag }}
          CURRENT_VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          # Check if upstream release exists
          if ! gh release view "$COPY_FROM_TAG" >/dev/null 2>&1; then
            echo "::warning::$COPY_FROM_TAG release not found, will build from source"
            echo "can_reuse=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          # Fetch upstream tag and extract version
          git fetch origin "refs/tags/$COPY_FROM_TAG:refs/tags/$COPY_FROM_TAG" 2>/dev/null || true

          if ! git rev-parse "refs/tags/$COPY_FROM_TAG" >/dev/null 2>&1; then
            echo "::warning::$COPY_FROM_TAG tag not found, will build from source"
            echo "can_reuse=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          if ! git cat-file -e "refs/tags/$COPY_FROM_TAG:src-tauri/tauri.conf.json" 2>/dev/null; then
            echo "::warning::tauri.conf.json not found in $COPY_FROM_TAG tag, will build from source"
            echo "can_reuse=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          UPSTREAM_VERSION=$(git show "refs/tags/$COPY_FROM_TAG:src-tauri/tauri.conf.json" 2>/dev/null | jq -r '.version' 2>&1)
          if [ -z "$UPSTREAM_VERSION" ] || [ "$UPSTREAM_VERSION" = "null" ]; then
            UPSTREAM_VERSION=$(git show "refs/tags/$COPY_FROM_TAG:src-tauri/tauri.conf.json" | grep -oP '"version":\s*"\K[^"]+' || echo "")
          fi

          if [ -z "$UPSTREAM_VERSION" ]; then
            echo "::warning::Failed to extract version from $COPY_FROM_TAG tag, will build from source"
            echo "can_reuse=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          echo "Version check: current=$CURRENT_VERSION, $COPY_FROM_TAG=$UPSTREAM_VERSION"
          if [ "$CURRENT_VERSION" = "$UPSTREAM_VERSION" ]; then
            echo "✅ Same version, will reuse $COPY_FROM_TAG artifacts"
            echo "can_reuse=true" >> $GITHUB_OUTPUT
          else
            echo "Version mismatch, will build from source"
            echo "can_reuse=false" >> $GITHUB_OUTPUT
          fi

  # Fail before the macOS runners start when official signing or notarization
  # credentials are missing. This avoids publishing a partial Release with
  # only Linux/Windows assets and makes the repair action explicit.
  release-preflight:
    needs: [resolve, delete-old-release, check-reuse]
    if: |
      !failure() && !cancelled() &&
      (needs.check-reuse.result == 'skipped' || needs.check-reuse.outputs.can_reuse == 'false')
    runs-on: ubuntu-latest
    steps:
      - name: Validate macOS release secrets
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_AUTH_KEY: ${{ secrets.APPLE_AUTH_KEY }}
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
          TAURI_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          missing=()
          for name in \
            APPLE_CERTIFICATE \
            APPLE_CERTIFICATE_PASSWORD \
            APPLE_AUTH_KEY \
            APPLE_API_KEY \
            APPLE_API_ISSUER \
            TAURI_PRIVATE_KEY \
            KEYCHAIN_PASSWORD; do
            if [ -z "${!name:-}" ]; then
              missing+=("$name")
            fi
          done

          if ((${#missing[@]} > 0)); then
            printf '::error::Missing GitHub Actions secret(s): %s\n' "${missing[*]}"
            echo 'Configure the required secrets before creating an official macOS release.'
            exit 1
          fi

          echo '✓ macOS signing, notarization, and updater secrets are present'

  # ── 4. Copy artifacts from upstream release ─────────────────────────
  copy-release:
    needs: [resolve, delete-old-release, check-reuse]
    # Run only when reuse is possible; tolerate skipped delete-old-release (stable)
    if: |
      !failure() && !cancelled() &&
      needs.check-reuse.outputs.can_reuse == 'true'
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Copy artifacts from ${{ needs.resolve.outputs.copy_from_tag }} to ${{ needs.resolve.outputs.tag_name }}
        timeout-minutes: 15
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          COPY_FROM_TAG: ${{ needs.resolve.outputs.copy_from_tag }}
          TAG_NAME: ${{ needs.resolve.outputs.tag_name }}
          RELEASE_NAME: ${{ needs.resolve.outputs.release_name }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
        run: |
          set -euo pipefail

          # gh release upload/download occasionally hangs on GitHub's release
          # API. Without a step timeout the job would sit for 6h (default).
          # Retry each network call up to 3 times with exponential backoff.
          retry() {
            local max=$1; shift
            local delay=5 n=1
            until "$@"; do
              if [ $n -ge $max ]; then
                echo "::error::command failed after $n attempts: $*"
                return 1
              fi
              echo "::warning::attempt $n/$max failed, retrying in ${delay}s..."
              sleep "$delay"
              delay=$((delay * 2))
              n=$((n + 1))
            done
          }

          # Get upstream release body
          CHANGELOG=$(gh release view "$COPY_FROM_TAG" --json body -q '.body')

          # Build create flags
          CREATE_FLAGS=(
            --title "$RELEASE_NAME"
            --notes "$CHANGELOG"
            --target "$GITHUB_SHA"
          )
          if [ "$PRERELEASE" = "true" ]; then
            CREATE_FLAGS+=(--prerelease)
          fi

          gh release create "$TAG_NAME" "${CREATE_FLAGS[@]}"

          # Download and re-upload assets
          TEMP_DIR=$(mktemp -d)
          retry 3 gh release download "$COPY_FROM_TAG" --dir "$TEMP_DIR" --pattern '*'

          FILE_COUNT=$(ls -1 "$TEMP_DIR" 2>/dev/null | wc -l)
          if [ "$FILE_COUNT" -gt 0 ]; then
            # Rewrite latest.json download URLs
            if [ -f "$TEMP_DIR/latest.json" ]; then
              sed -i "s|/releases/download/$COPY_FROM_TAG/|/releases/download/$TAG_NAME/|g" "$TEMP_DIR/latest.json"
              echo "✅ Updated latest.json URLs to point to $TAG_NAME"
            fi

            retry 3 gh release upload "$TAG_NAME" "$TEMP_DIR"/* --clobber
            echo "✅ Copied $FILE_COUNT assets from $COPY_FROM_TAG to $TAG_NAME"
          else
            echo "::warning::No assets found in $COPY_FROM_TAG release"
          fi

          rm -rf "$TEMP_DIR"

  # ── 5. Full build (when no reuse is possible) ──────────────────────
  #
  # macOS aarch64 and x86 are split into separate jobs (not a matrix) so that
  # swatinem/rust-cache's auto-generated cache key, which includes
  # `${{ github.job }}`, differs between the two targets. A shared matrix
  # would collide on the job id and only one target's artifacts would
  # survive across runs — in practice x86 was always rebuilding from scratch.
  # Linux and Windows are also separate jobs for symmetry.

  build-macos-arm64:
    needs: [resolve, delete-old-release, check-reuse, release-preflight]
    if: |
      !failure() && !cancelled() &&
      (needs.check-reuse.result == 'skipped' || needs.check-reuse.outputs.can_reuse == 'false')
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: deno install

      - name: Process CHANGELOG
        run: deno task process-changelog

      - name: Read CHANGELOG
        id: decode
        shell: bash
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Binaries
        run: deno task download-binaries

      - name: Verify committed config template snapshot
        shell: bash
        run: |
          set -euo pipefail
          deno task sync-templates
          test -f src/config/templates/generated.ts \
            || { echo "::error::committed generated.ts is missing"; exit 1; }
          grep -q "BUILT_IN_TEMPLATE_OBJECTS" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILT_IN_TEMPLATE_OBJECTS export"; exit 1; }
          grep -q "BUILD_TIME_TEMPLATE_SOURCE" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILD_TIME_TEMPLATE_SOURCE metadata"; exit 1; }
          grep -q "singBoxVersion: 'v" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing singBoxVersion"; exit 1; }
          echo "✓ committed template snapshot verified"

      - name: Initialize Apple Signing Key
        shell: bash
        run: |
          echo "${{ secrets.APPLE_AUTH_KEY }}" > $GITHUB_WORKSPACE/temp_auth_key.p8

      - name: Import signing certificate for helper prebuild
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/helper-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 12)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Helper signing certificate imported into $KEYCHAIN_PATH"

      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/temp_auth_key.p8
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: ${{ needs.resolve.outputs.tag_name }}
          releaseName: ${{ needs.resolve.outputs.release_name }}
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: --target aarch64-apple-darwin
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}

      - name: Clean Up Apple Signing Key
        shell: bash
        run: rm -f temp_auth_key.p8

  build-macos-x86:
    needs: [resolve, delete-old-release, check-reuse, release-preflight]
    if: |
      !failure() && !cancelled() &&
      (needs.check-reuse.result == 'skipped' || needs.check-reuse.outputs.can_reuse == 'false')
    runs-on: macos-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-apple-darwin

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: deno install

      - name: Process CHANGELOG
        run: deno task process-changelog

      - name: Read CHANGELOG
        id: decode
        shell: bash
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Binaries
        run: deno task download-binaries

      - name: Verify committed config template snapshot
        shell: bash
        run: |
          set -euo pipefail
          deno task sync-templates
          test -f src/config/templates/generated.ts \
            || { echo "::error::committed generated.ts is missing"; exit 1; }
          grep -q "BUILT_IN_TEMPLATE_OBJECTS" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILT_IN_TEMPLATE_OBJECTS export"; exit 1; }
          grep -q "BUILD_TIME_TEMPLATE_SOURCE" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILD_TIME_TEMPLATE_SOURCE metadata"; exit 1; }
          grep -q "singBoxVersion: 'v" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing singBoxVersion"; exit 1; }
          echo "✓ committed template snapshot verified"

      - name: Initialize Apple Signing Key
        shell: bash
        run: |
          echo "${{ secrets.APPLE_AUTH_KEY }}" > $GITHUB_WORKSPACE/temp_auth_key.p8

      - name: Import signing certificate for helper prebuild
        shell: bash
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/helper-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -base64 12)"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          echo "$APPLE_CERTIFICATE" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -k "$KEYCHAIN_PATH" \
            -P "$APPLE_CERTIFICATE_PASSWORD" -T /usr/bin/codesign -T /usr/bin/security
          security set-key-partition-list -S apple-tool:,apple: \
            -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security list-keychains -d user -s "$KEYCHAIN_PATH" \
            $(security list-keychains -d user | tr -d '"')
          rm -f "$RUNNER_TEMP/cert.p12"
          echo "Helper signing certificate imported into $KEYCHAIN_PATH"

      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_PATH: ${{ github.workspace }}/temp_auth_key.p8
          APPLE_API_KEY: ${{ secrets.APPLE_API_KEY }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        with:
          tagName: ${{ needs.resolve.outputs.tag_name }}
          releaseName: ${{ needs.resolve.outputs.release_name }}
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: --target x86_64-apple-darwin
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}

      - name: Clean Up Apple Signing Key
        shell: bash
        run: rm -f temp_auth_key.p8

  build-linux:
    needs: [resolve, delete-old-release, check-reuse, release-preflight]
    if: |
      !failure() && !cancelled() &&
      (needs.check-reuse.result == 'skipped' || needs.check-reuse.outputs.can_reuse == 'false')
    runs-on: ubuntu-24.04
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Install Linux Dependencies
        run: |
          sudo apt update
          sudo apt install libwebkit2gtk-4.1-dev \
            build-essential \
            curl \
            wget \
            file \
            libxdo-dev \
            libssl-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: deno install

      - name: Process CHANGELOG
        run: deno task process-changelog

      - name: Read CHANGELOG
        id: decode
        shell: bash
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Binaries
        run: deno task download-binaries

      - name: Verify committed config template snapshot
        shell: bash
        run: |
          set -euo pipefail
          deno task sync-templates
          test -f src/config/templates/generated.ts \
            || { echo "::error::committed generated.ts is missing"; exit 1; }
          grep -q "BUILT_IN_TEMPLATE_OBJECTS" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILT_IN_TEMPLATE_OBJECTS export"; exit 1; }
          grep -q "BUILD_TIME_TEMPLATE_SOURCE" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILD_TIME_TEMPLATE_SOURCE metadata"; exit 1; }
          grep -q "singBoxVersion: 'v" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing singBoxVersion"; exit 1; }
          echo "✓ committed template snapshot verified"

      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ needs.resolve.outputs.tag_name }}
          releaseName: ${{ needs.resolve.outputs.release_name }}
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: ""
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}

  build-windows:
    needs: [resolve, delete-old-release, check-reuse, release-preflight]
    if: |
      !failure() && !cancelled() &&
      (needs.check-reuse.result == 'skipped' || needs.check-reuse.outputs.can_reuse == 'false')
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - uses: actions/checkout@v4

      - name: Set Up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      - name: Set Up Deno
        uses: denoland/setup-deno@v2
        with:
          deno-version: v2.x

      - name: Set Up Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install Frontend Dependencies
        run: deno install

      - name: Process CHANGELOG
        run: deno task process-changelog

      - name: Read CHANGELOG
        id: decode
        shell: bash
        run: |
          content=$(cat CHANGELOG.MD)
          echo "content<<EOF" >> $GITHUB_OUTPUT
          echo "$content" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Download Binaries
        run: deno task download-binaries

      - name: Verify committed config template snapshot
        shell: bash
        run: |
          set -euo pipefail
          deno task sync-templates
          test -f src/config/templates/generated.ts \
            || { echo "::error::committed generated.ts is missing"; exit 1; }
          grep -q "BUILT_IN_TEMPLATE_OBJECTS" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILT_IN_TEMPLATE_OBJECTS export"; exit 1; }
          grep -q "BUILD_TIME_TEMPLATE_SOURCE" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing BUILD_TIME_TEMPLATE_SOURCE metadata"; exit 1; }
          grep -q "singBoxVersion: 'v" src/config/templates/generated.ts \
            || { echo "::error::generated.ts missing singBoxVersion"; exit 1; }
          echo "✓ committed template snapshot verified"

      - name: Build tun-service
        shell: bash
        run: |
          set -euo pipefail
          deno task build:tun-service --release
          test -f src-tauri/binaries/tun-service-x86_64-pc-windows-msvc.exe \
            || { echo "::error::tun-service binary was not staged for Tauri externalBin"; exit 1; }
          echo "✓ tun-service staged for Tauri externalBin"

      - name: Build and Release with Tauri Action
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ACCELERATE_URL: ${{ secrets.ACCELERATE_URL }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_PRIVATE_KEY }}
        with:
          tagName: ${{ needs.resolve.outputs.tag_name }}
          releaseName: ${{ needs.resolve.outputs.release_name }}
          releaseBody: |
            ${{ steps.decode.outputs.content }}
          args: ""
          prerelease: ${{ needs.resolve.outputs.prerelease == 'true' }}

  # ── 6. Delete oversized caches produced by this run ───────────────
  # Runs after all build jobs (including their rust-cache post-save steps)
  # complete. Only prunes caches above the size threshold; the weekly
  # cache-cleanup workflow handles "keep N most recent" pruning.
  cleanup-oversized-caches:
    needs: [build-macos-arm64, build-macos-x86, build-linux, build-windows]
    if: ${{ !cancelled() }}
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: read
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Delete caches larger than threshold
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          MAX_BYTES: "943718400"
          REPO: ${{ github.repository }}
        shell: bash
        run: |
          set -euo pipefail
          threshold_human=$(numfmt --to=iec --suffix=B "$MAX_BYTES" 2>/dev/null || echo "$MAX_BYTES B")
          echo "Scanning caches in $REPO for entries larger than $threshold_human"

          gh cache list --repo "$REPO" --limit 100 \
            --json id,key,sizeInBytes > caches.json

          jq -r --argjson max_bytes "$MAX_BYTES" \
            '.[] | select(.sizeInBytes > $max_bytes) | "\(.id)\t\(.sizeInBytes)\t\(.key)"' \
            caches.json \
          | while IFS=$'\t' read -r id size key; do
              human=$(numfmt --to=iec --suffix=B "$size" 2>/dev/null || echo "$size B")
              echo "Deleting oversized cache id=$id size=$human key=$key"
              gh cache delete "$id" --repo "$REPO" || true
            done
          echo "Done."
