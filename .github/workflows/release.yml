name: "Release Native macOS"

on:
  workflow_dispatch:
    inputs:
      channel:
        description: "Release channel"
        type: choice
        options:
          - dev
          - beta
          - stable
          - manual
        default: manual
  push:
    paths:
      - "native/VERSION"
    branches:
      - feature/dev
      - feature/beta
      - main

concurrency:
  group: native-release-${{ github.ref }}
  # Never interrupt a run after it has started an external Release mutation.
  cancel-in-progress: false

permissions:
  contents: read

jobs:
  resolve:
    name: Resolve native release
    runs-on: ubuntu-24.04
    outputs:
      channel: ${{ steps.release.outputs.channel }}
      version: ${{ steps.release.outputs.version }}
      tag: ${{ steps.release.outputs.tag }}
      title: ${{ steps.release.outputs.title }}
      prerelease: ${{ steps.release.outputs.prerelease }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Enforce Swift and upstream-Go architecture
        run: native/scripts/check-release-policy.sh

      - name: Resolve version and channel
        id: release
        shell: bash
        run: |
          set -euo pipefail
          VERSION=$(tr -d '[:space:]' < native/VERSION)
          [[ "$VERSION" =~ ^(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)\.(0|[1-9][0-9]*)$ ]] || {
            echo "::error::native/VERSION is not strict semantic versioning: $VERSION"
            exit 1
          }

          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            CHANNEL="${{ inputs.channel }}"
          else
            case "${{ github.ref_name }}" in
              feature/dev) CHANNEL="dev" ;;
              feature/beta) CHANNEL="beta" ;;
              main) CHANNEL="stable" ;;
              *) echo "::error::Unsupported release branch: ${{ github.ref_name }}"; exit 1 ;;
            esac
          fi

          case "$CHANNEL" in
            dev)
              [[ "${{ github.ref_name }}" == "feature/dev" ]] || { echo "::error::dev releases require feature/dev"; exit 1; }
              TAG="dev"
              TITLE="NekoPilot Dev"
              PRERELEASE="true"
              ;;
            beta)
              [[ "${{ github.ref_name }}" == "feature/beta" ]] || { echo "::error::beta releases require feature/beta"; exit 1; }
              TAG="beta"
              TITLE="NekoPilot Beta"
              PRERELEASE="true"
              ;;
            stable)
              [[ "${{ github.ref_name }}" == "main" ]] || { echo "::error::stable releases require main"; exit 1; }
              TAG="v${VERSION}"
              TITLE="NekoPilot v${VERSION}"
              PRERELEASE="false"
              ;;
            manual)
              TAG="manual"
              TITLE="NekoPilot Manual"
              PRERELEASE="true"
              ;;
            *) echo "::error::Unsupported channel: $CHANNEL"; exit 1 ;;
          esac

          echo "channel=$CHANNEL" >> "$GITHUB_OUTPUT"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "title=$TITLE" >> "$GITHUB_OUTPUT"
          echo "prerelease=$PRERELEASE" >> "$GITHUB_OUTPUT"

  build:
    name: Build and verify Apple Silicon package
    needs: resolve
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Select the pinned Xcode toolchain
        shell: bash
        run: |
          set -euo pipefail
          [[ "$(uname -m)" == "arm64" ]] || { echo "::error::Release runner is not Apple Silicon"; exit 1; }
          test -d /Applications/Xcode_26.2.app
          sudo xcode-select -s /Applications/Xcode_26.2.app/Contents/Developer
          xcodebuild -version | grep -Fx "Xcode 26.2"
          [[ "$(xcrun --sdk macosx --show-sdk-version)" == "26.2" ]]

      - name: Set up pinned Go
        uses: actions/setup-go@b7ad1dad31e06c5925ef5d2fc7ad053ef454303e # v7.0.0
        with:
          go-version: "1.26.5"
          check-latest: false
          cache: false

      - name: Build sing-box twice from pinned upstream source
        env:
          GH_TOKEN: ${{ github.token }}
          GOPROXY: https://proxy.golang.org,direct
          NEKOPILOT_VERIFY_REPRODUCIBLE: "1"
        run: native/scripts/build-sing-box-macos-arm64.sh

      - name: Build, ad-hoc sign, and verify native package
        env:
          NEKOPILOT_SING_BOX_SOURCE: ${{ github.workspace }}/native/.build/sidecar/sing-box
        run: native/scripts/package-macos.sh "$RUNNER_TEMP/native-release"

      - name: Upload exact release allow-list
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: native-macos-arm64-${{ needs.resolve.outputs.version }}
          path: |
            ${{ runner.temp }}/native-release/NekoPilot_${{ needs.resolve.outputs.version }}_aarch64.dmg
            ${{ runner.temp }}/native-release/NekoPilot_${{ needs.resolve.outputs.version }}_aarch64.app.tar.gz
            ${{ runner.temp }}/native-release/SHA256SUMS
          if-no-files-found: error
          retention-days: 7

  publish:
    name: Publish GitHub Release
    needs: [resolve, build]
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0

      - name: Download verified package
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: native-macos-arm64-${{ needs.resolve.outputs.version }}
          path: release-assets

      - name: Enforce release asset allow-list and checksums
        shell: bash
        env:
          VERSION: ${{ needs.resolve.outputs.version }}
        run: |
          set -euo pipefail
          EXPECTED=$(printf '%s\n' \
            "NekoPilot_${VERSION}_aarch64.app.tar.gz" \
            "NekoPilot_${VERSION}_aarch64.dmg" \
            "SHA256SUMS")
          ACTUAL=$(find release-assets -mindepth 1 -maxdepth 1 -type f -printf '%f\n' | LC_ALL=C sort)
          if [[ "$ACTUAL" != "$EXPECTED" ]]; then
            echo "::error::Release artifact allow-list mismatch"
            diff -u <(printf '%s\n' "$EXPECTED") <(printf '%s\n' "$ACTUAL") || true
            exit 1
          fi
          (cd release-assets && sha256sum --check SHA256SUMS)

      - name: Publish immutable stable or replace rolling channel
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          CHANNEL: ${{ needs.resolve.outputs.channel }}
          VERSION: ${{ needs.resolve.outputs.version }}
          TAG: ${{ needs.resolve.outputs.tag }}
          TITLE: ${{ needs.resolve.outputs.title }}
          PRERELEASE: ${{ needs.resolve.outputs.prerelease }}
        run: |
          set -euo pipefail

          if [[ "$CHANNEL" == "stable" ]]; then
            if git ls-remote --exit-code --tags origin "refs/tags/$TAG" >/dev/null 2>&1 || \
               gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              echo "::error::Stable tag $TAG already exists. Stable releases are immutable; bump native/VERSION."
              exit 1
            fi
          else
            if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
              gh release delete "$TAG" --repo "$GITHUB_REPOSITORY" --cleanup-tag --yes
            elif gh api "repos/$GITHUB_REPOSITORY/git/ref/tags/$TAG" >/dev/null 2>&1; then
              gh api --method DELETE "repos/$GITHUB_REPOSITORY/git/refs/tags/$TAG"
            fi
          fi

          RELEASE_ARGS=(
            "$TAG"
            release-assets/NekoPilot_${VERSION}_aarch64.dmg
            release-assets/NekoPilot_${VERSION}_aarch64.app.tar.gz
            release-assets/SHA256SUMS
            --repo "$GITHUB_REPOSITORY"
            --target "$GITHUB_SHA"
            --title "$TITLE"
            --notes "Native SwiftUI/AppKit Apple Silicon release ${VERSION}. The bundled sing-box core is built from pinned upstream source. Verify downloads with SHA256SUMS."
          )
          if [[ "$PRERELEASE" == "true" ]]; then
            RELEASE_ARGS+=(--prerelease)
          fi
          gh release create "${RELEASE_ARGS[@]}"
