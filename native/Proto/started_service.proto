syntax = "proto3";

// Wire-compatible subset of sing-box daemon/started_service.proto.
//
// NekoPilot deliberately generates only the messages it consumes while using
// the official public gRPC method paths. The authoritative schema is pinned
// with the sing-box source revision in scripts/build-sing-box-macos-arm64.sh.
package nekopilot.api;

message ServiceStatus {
  int32 status = 1;
  string error_message = 2;
}

message GroupItem {
  string tag = 1;
  string type = 2;
  int64 url_test_time = 3;
  int32 url_test_delay = 4;
}

message Group {
  string tag = 1;
  string type = 2;
  bool selectable = 3;
  string selected = 4;
  bool is_expand = 5;
  repeated GroupItem items = 6;
}

message Groups {
  repeated Group group = 1;
}

message URLTestRequest {
  string outbound_tag = 1;
}

message SelectOutboundRequest {
  string group_tag = 1;
  string outbound_tag = 2;
}

message OutboundList {
  repeated GroupItem outbounds = 1;
}

message SubscribeConnectionsRequest {
  int64 interval = 1;
}

enum ConnectionEventType {
  CONNECTION_EVENT_NEW = 0;
  CONNECTION_EVENT_UPDATE = 1;
  CONNECTION_EVENT_CLOSED = 2;
}

message ConnectionEvent {
  ConnectionEventType type = 1;
  string id = 2;
  Connection connection = 3;
  int64 uplink_delta = 4;
  int64 downlink_delta = 5;
  int64 closed_at = 6;
}

message ConnectionEvents {
  repeated ConnectionEvent events = 1;
  bool reset = 2;
}

// Field numbers intentionally match daemon.Connection in the pinned upstream
// schema. Only the values needed for per-outbound traffic accounting are
// generated into the Swift client.
message Connection {
  string id = 1;
  int64 created_at = 12;
  int64 closed_at = 13;
  int64 uplink_total = 16;
  int64 downlink_total = 17;
  string outbound = 19;
}
